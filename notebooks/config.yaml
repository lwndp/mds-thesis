stm:
  narrative_topics:
    # Likely female-leaning
    - 34   # Familienpolitik & Kinderbetreuung
    - 88   # Pflegepolitik & Pflegeversicherung
    - 41   # Frauenpolitik & Gleichstellung
    - 30   # Reproduktionsrechte & sexuelle Identität  (replaces old Häusliche Gewalt/Prostitution — closest available)
    - 29   # Tierschutz & Nutztierhaltung
    - 68   # Schulpolitik & Bildungsqualität
    # Likely male-leaning
    - 22   # Auslandsmissionen der Bundeswehr
    - 15   # Verteidigungshaushalt & Rüstungsbeschaffung
    - 9    # Wirtschaftswachstum & Konjunkturpolitik
    - 8    # Haushaltspolitik & Staatsschulden
    # Mixed / theoretically interesting
    - 80   # Energiewende & erneuerbare Energien
    - 84   # Mindestlohn & atypische Beschäftigung
  top_n:
    prevalence: 15
    gender_forest: 30
    faction_variance: 20
    composition_forest: 30
  model:
    spline_df: 5
    sig_alpha: 0.05
  plot:
    x_break_years:
      - 1994
      - 2002
      - 2014
      - 2022
    label_wrap_width: 40
    narrative_label_wrap_width: 35
    entropy_eps: 1e-12
    entropy_binwidth: 0.02
    entropy_label_x_offset: 0.02
    entropy_label_y: 6500

colors:
  # Core gender palette: semantic identity
  female: "#d11c8b"
  male: "#0088cc"

  # Effect semantics: derived from gender (Positive = Female-leaning, Negative = Male-leaning)
  positive: "#d11c8b"
  negative: "#0088cc"

  # Utility colors (now unified with core palette)
  not_significant: "#aaaaaa"
  red: "#B91C1C"
  blue: "#0088CC"
  gray: "#8b8b8b"
  dark_gray: "#4a4a4a"
  light_gray: "#aaaaaa"
  grid_gray: "#bbbbbb"
  axis_line: "#333333"

  genders:
    "Female": "#d11c8b"
    "Male": "#0088cc"

  academic_colors:
    "Doctorate": "#2c5f8a"
    "No doctorate": "#8b8b8b"

  parties:
